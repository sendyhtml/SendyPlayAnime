<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SendyPlay - Profil Saya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #1a120b;
            color: white;
            padding-bottom: 80px;
        }

        .navbar {
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #FFD700;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-button {
            color: #FFD700;
            font-size: 24px;
            cursor: pointer;
        }

        .main-content {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #1a120b;
            margin: 0 auto 20px;
            border: 4px solid #FFD700;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .profile-email {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
            text-align: center;
        }

        .stat-item {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px;
            border-radius: 20px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .form-group input[readonly] {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 40px;
            color: #1a120b;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 2px solid #FFD700;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item:hover, .nav-item.active {
            color: #FFD700;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="back-button" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <div class="logo">
                <h2><i class="fas fa-film"></i> SendyPlay</h2>
            </div>
            <div style="width: 40px;"></div>
        </div>
    </nav>

    <div class="main-content">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">U</div>
                <div class="profile-username" id="profileUsername">Username</div>
                <div class="profile-email" id="profileEmail">email@example.com</div>
            </div>

            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalWatched">0</div>
                    <div class="stat-label">Ditonton</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalComments">0</div>
                    <div class="stat-label">Komentar</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="memberSince">2025</div>
                    <div class="stat-label">Member</div>
                </div>
            </div>

            <form onsubmit="saveProfile(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="inputUsername" value="animefan" readonly>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="inputEmail" value="animefan@example.com">
                </div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="fullName" placeholder="Masukkan nama lengkap">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <input type="text" id="bio" placeholder="Tulis sesuatu tentang dirimu">
                </div>
                <button type="submit" class="btn-save">Simpan Perubahan</button>
            </form>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <div class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </div>
        <div class="nav-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Log Out</span>
        </div>
    </div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        const username = localStorage.getItem('username') || 'AnimeFan';
        const email = localStorage.getItem('userEmail') || 'user@example.com';

        document.getElementById('profileUsername').textContent = username;
        document.getElementById('profileEmail').textContent = email;
        document.getElementById('profileAvatar').textContent = username.charAt(0).toUpperCase();
        document.getElementById('inputUsername').value = username;
        document.getElementById('inputEmail').value = email;

        // Load saved profile data
        document.getElementById('fullName').value = localStorage.getItem('fullName') || '';
        document.getElementById('bio').value = localStorage.getItem('bio') || '';

        // Load stats
        document.getElementById('totalWatched').textContent = localStorage.getItem('totalWatched') || '12';
        document.getElementById('totalComments').textContent = localStorage.getItem('totalComments') || '8';

        function saveProfile(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const bio = document.getElementById('bio').value;

            localStorage.setItem('fullName', fullName);
            localStorage.setItem('bio', bio);

            alert('Profil berhasil diperbarui!');
        }

        function goBack() {
            window.history.back();
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

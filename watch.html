<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SendyPlay - Nonton Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #1a120b;
            color: white;
            padding-bottom: 80px;
        }

        /* Navbar (sama seperti dashboard) */
        .navbar {
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #FFD700;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-button {
            color: #FFD700;
            font-size: 24px;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #FFD700;
            font-weight: 600;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a120b;
        }

        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 30px;
        }

        /* Video Player */
        .video-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 2px solid #FFD700;
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }

        .video-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #2d1f12, #1a120b);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #FFD700;
        }

        .video-placeholder i {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .video-placeholder p {
            font-size: 18px;
            opacity: 0.8;
        }

        /* Anime Info */
        .anime-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .anime-title {
            font-size: 32px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 15px;
        }

        .anime-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #FFD700;
        }

        .meta-item i {
            margin-right: 8px;
        }

        .genre-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .genre-tag {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .synopsis {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            margin-top: 20px;
            border-left: 3px solid #FFD700;
            padding-left: 20px;
        }

        /* Episode List */
        .episodes-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #FFD700;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .episode-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: white;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            font-size: 14px;
        }

        .episode-btn:hover {
            background: #FFD700;
            color: #1a120b;
            border-color: #FFD700;
        }

        .episode-btn.active {
            background: #FFD700;
            color: #1a120b;
            border-color: #FFD700;
        }

        /* Comments Section */
        .comments-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .comment-input-area {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .comment-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 15px 20px;
            color: white;
            font-size: 14px;
        }

        .comment-input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .comment-btn {
            background: #FFD700;
            border: none;
            border-radius: 30px;
            padding: 0 30px;
            color: #1a120b;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comment-btn:hover {
            background: #FFA500;
            transform: translateY(-2px);
        }

        .comment-btn i {
            font-size: 18px;
        }

        .comments-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 3px solid #FFD700;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #FFD700;
            font-weight: 600;
        }

        .comment-time {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .comment-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            line-height: 1.6;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 2px solid #FFD700;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item:hover, .nav-item.active {
            color: #FFD700;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #FFD700;
            color: #1a120b;
            padding: 15px 25px;
            border-radius: 30px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .anime-title {
                font-size: 24px;
            }
            .comment-input-area {
                flex-direction: column;
            }
            .comment-btn {
                padding: 15px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Notification -->
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationMessage">Pesan terkirim ke Telegram!</span>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="back-button" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <div class="logo">
                <h2><i class="fas fa-film"></i> SendyPlay</h2>
            </div>
            <div class="user-info">
                <span class="username" id="displayUsername"></span>
                <div class="avatar" id="userAvatar"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Video Player -->
        <div class="video-container">
            <div class="video-player" id="videoPlayer"></div>
            <div class="video-placeholder" id="videoPlaceholder">
                <i class="fas fa-play-circle"></i>
                <p>Pilih episode untuk mulai menonton</p>
            </div>
        </div>

        <!-- Anime Info -->
        <div class="anime-info" id="animeInfo">
            <h1 class="anime-title" id="animeTitle">Loading...</h1>
            <div class="anime-meta" id="animeMeta"></div>
            <div class="genre-tags" id="genreTags"></div>
            <div class="synopsis" id="synopsis"></div>
        </div>

        <!-- Episodes -->
        <div class="episodes-section">
            <div class="section-title">
                <i class="fas fa-list"></i>
                <h3>Daftar Episode</h3>
            </div>
            <div class="episode-grid" id="episodeGrid"></div>
        </div>

        <!-- Comments -->
        <div class="comments-section">
            <div class="section-title">
                <i class="fas fa-comments"></i>
                <h3>Komentar</h3>
            </div>
            
            <!-- Comment Input -->
            <div class="comment-input-area">
                <input type="text" class="comment-input" id="commentInput" placeholder="Tulis komentar... (akan dikirim ke Telegram owner)">
                <button class="comment-btn" onclick="sendComment()">
                    <i class="fas fa-paper-plane"></i>
                    <span>Kirim</span>
                </button>
            </div>

            <!-- Comments List -->
            <div class="comments-list" id="commentsList">
                <!-- Comments will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <div class="nav-item" onclick="navigateTo('profile')">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </div>
        <div class="nav-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Log Out</span>
        </div>
    </div>

    <script>
        // Check login status
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display user info
        const username = localStorage.getItem('username') || 'AnimeFan';
        document.getElementById('displayUsername').textContent = username;
        document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();

        // Get anime ID from localStorage
        const animeId = localStorage.getItem('currentAnimeId') || '1';
        const animeTitle = localStorage.getItem('currentAnimeTitle') || 'One Piece';

        // Telegram Bot Configuration
        const TELEGRAM_BOT_TOKEN = '8401471630:AAFFes0xPxsP0Xq7U_vKBqH0ZTZIjvL68Zk'; // Ganti dengan token bot kamu
        const TELEGRAM_CHAT_ID = '7546117130'; // Ganti dengan chat ID owner

        // API Configuration
        const API_BASE = 'https://api.jikan.moe/v4';

        // Load anime details
        async function loadAnimeDetails() {
            try {
                const response = await fetch(`${API_BASE}/anime/${animeId}/full`);
                const data = await response.json();
                const anime = data.data;

                document.getElementById('animeTitle').textContent = anime.title;

                // Meta info
                const metaHtml = `
                    <span class="meta-item"><i class="fas fa-star"></i> ${anime.score || 'N/A'}</span>
                    <span class="meta-item"><i class="fas fa-calendar"></i> ${anime.year || 'TBA'}</span>
                    <span class="meta-item"><i class="fas fa-tv"></i> ${anime.type || 'TV'}</span>
                    <span class="meta-item"><i class="fas fa-layer-group"></i> ${anime.episodes || '?'} Episode</span>
                `;
                document.getElementById('animeMeta').innerHTML = metaHtml;

                // Genres
                const genresHtml = anime.genres.map(genre => 
                    `<span class="genre-tag">${genre.name}</span>`
                ).join('');
                document.getElementById('genreTags').innerHTML = genresHtml;

                // Synopsis
                document.getElementById('synopsis').textContent = anime.synopsis || 'Sinopsis tidak tersedia.';

                // Generate episodes
                generateEpisodes(anime.episodes || 12);

            } catch (error) {
                console.error('Error loading anime details:', error);
                // Fallback data
                document.getElementById('animeTitle').textContent = animeTitle;
                document.getElementById('synopsis').textContent = 'Sinopsis tidak tersedia untuk saat ini.';
                generateEpisodes(12);
            }
        }

        function generateEpisodes(totalEpisodes) {
            const grid = document.getElementById('episodeGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= Math.min(totalEpisodes, 24); i++) {
                const btn = document.createElement('div');
                btn.className = 'episode-btn';
                btn.textContent = `Episode ${i}`;
                btn.onclick = () => playEpisode(i);
                grid.appendChild(btn);
            }
        }

        function playEpisode(episode) {
            // Hide placeholder, show player
            document.getElementById('videoPlaceholder').style.display = 'none';
            
            // Embed video (contoh menggunakan embed dari berbagai source)
            // Ini adalah contoh embed, di real implementation bisa menggunakan berbagai source
            const videoPlayer = document.getElementById('videoPlayer');
            
            // Menggunakan embed dari berbagai sumber anime (contoh)
            // Ganti dengan source yang valid
            videoPlayer.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    src="https://www.youtube.com/embed?listType=search&list=${animeTitle} episode ${episode}" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            `;

            // Highlight active episode
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Show notification
            showNotification(`Memutar Episode ${episode}`);
        }

        // Comments functionality
        function loadComments() {
            const comments = JSON.parse(localStorage.getItem('animeComments_' + animeId)) || [];
            const commentsList = document.getElementById('commentsList');
            
            if (comments.length === 0) {
                commentsList.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center;">Belum ada komentar. Jadilah yang pertama!</p>';
                return;
            }

            commentsList.innerHTML = comments.reverse().map(comment => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span><i class="fas fa-user"></i> ${comment.username}</span>
                        <span class="comment-time">${comment.time}</span>
                    </div>
                    <div class="comment-text">${comment.text}</div>
                </div>
            `).join('');
        }

        async function sendComment() {
            const commentInput = document.getElementById('commentInput');
            const comment = commentInput.value.trim();

            if (!comment) {
                alert('Komentar tidak boleh kosong!');
                return;
            }

            const username = localStorage.getItem('username') || 'Anonymous';
            const time = new Date().toLocaleString('id-ID');

            // Save comment locally
            const comments = JSON.parse(localStorage.getItem('animeComments_' + animeId)) || [];
            comments.push({
                username: username,
                text: comment,
                time: time
            });
            localStorage.setItem('animeComments_' + animeId, JSON.stringify(comments));

            // Send to Telegram
            const message = `💬 *Komentar Baru di SendyPlay!*\n\n📺 *Anime:* ${animeTitle}\n👤 *User:* ${username}\n⏰ *Waktu:* ${time}\n💭 *Komentar:* ${comment}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    showNotification('Komentar terkirim ke Telegram owner!');
                } else {
                    showNotification('Komentar disimpan (Telegram notifikasi gagal)', false);
                }
            } catch (error) {
                console.error('Error sending to Telegram:', error);
                showNotification('Komentar disimpan secara lokal', false);
            }

            // Clear input and reload comments
            commentInput.value = '';
            loadComments();
        }

        function showNotification(message, isSuccess = true) {
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notificationMessage');
            
            notificationMessage.textContent = message;
            notification.style.background = isSuccess ? '#FFD700' : '#ff6b6b';
            notification.style.color = isSuccess ? '#1a120b' : 'white';
            notification.style.display = 'flex';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function goBack() {
            window.history.back();
        }

        function navigateTo(page) {
            if (page === 'profile') {
                window.location.href = 'profile.html';
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }

        // Load data on page load
        loadAnimeDetails();
        loadComments();
    </script>
</body>
</html>

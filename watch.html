<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SendyPlay - Nonton Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #1a120b;
            color: white;
            padding-bottom: 80px;
        }

        /* Navbar */
        .navbar {
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #FFD700;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-button {
            color: #FFD700;
            font-size: 24px;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #FFD700;
            font-weight: 600;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a120b;
        }

        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 30px;
        }

        /* Video Player */
        .video-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 2px solid #FFD700;
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }

        .video-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #2d1f12, #1a120b);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #FFD700;
        }

        .video-placeholder i {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .video-placeholder p {
            font-size: 18px;
            opacity: 0.8;
        }

        /* Anime Info */
        .anime-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .anime-title {
            font-size: 32px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 15px;
        }

        .anime-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #FFD700;
        }

        .meta-item i {
            margin-right: 8px;
        }

        .genre-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .genre-tag {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .genre-tag:hover {
            background: #FFD700;
            color: #1a120b;
        }

        .synopsis {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            margin-top: 20px;
            border-left: 3px solid #FFD700;
            padding-left: 20px;
        }

        /* Episode List */
        .episodes-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #FFD700;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .episode-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: white;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            font-size: 14px;
        }

        .episode-btn:hover {
            background: #FFD700;
            color: #1a120b;
            border-color: #FFD700;
            transform: translateY(-2px);
        }

        .episode-btn.active {
            background: #FFD700;
            color: #1a120b;
            border-color: #FFD700;
        }

        .episode-btn.loading {
            position: relative;
            color: transparent;
        }

        .episode-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #FFD700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Server Selector */
        .server-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .server-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        .server-btn:hover, .server-btn.active {
            background: #FFD700;
            color: #1a120b;
        }

        /* Comments Section */
        .comments-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .comment-input-area {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .comment-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 15px 20px;
            color: white;
            font-size: 14px;
        }

        .comment-input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .comment-btn {
            background: #FFD700;
            border: none;
            border-radius: 30px;
            padding: 0 30px;
            color: #1a120b;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comment-btn:hover {
            background: #FFA500;
            transform: translateY(-2px);
        }

        .comments-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 3px solid #FFD700;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #FFD700;
            font-weight: 600;
        }

        .comment-time {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .comment-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            line-height: 1.6;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: #FFD700;
        }

        .loading i {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 2px solid #FFD700;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item:hover, .nav-item.active {
            color: #FFD700;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #FFD700;
            color: #1a120b;
            padding: 15px 25px;
            border-radius: 30px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Related Anime */
        .related-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .related-card {
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .related-card:hover {
            transform: translateY(-5px);
        }

        .related-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, #2d1f12, #1a120b);
            border-radius: 15px;
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .related-title {
            font-size: 13px;
            color: #FFD700;
        }

        @media (max-width: 768px) {
            .anime-title {
                font-size: 24px;
            }
            .comment-input-area {
                flex-direction: column;
            }
            .comment-btn {
                padding: 15px;
                justify-content: center;
            }
            .episode-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Notification -->
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationMessage">Pesan terkirim ke Telegram!</span>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="back-button" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <div class="logo">
                <h2><i class="fas fa-film"></i> SendyPlay</h2>
            </div>
            <div class="user-info">
                <span class="username" id="displayUsername"></span>
                <div class="avatar" id="userAvatar"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <i class="fas fa-spinner"></i>
            <p>Memuat video...</p>
        </div>

        <!-- Video Player -->
        <div class="video-container">
            <iframe class="video-player" id="videoPlayer" frameborder="0" allowfullscreen style="display: none;"></iframe>
            <div class="video-placeholder" id="videoPlaceholder">
                <i class="fas fa-play-circle"></i>
                <p>Pilih episode untuk mulai menonton</p>
            </div>
        </div>

        <!-- Server Selector -->
        <div class="server-selector" id="serverSelector" style="display: none;">
            <button class="server-btn active" onclick="changeServer('gogoanime')">Gogoanime</button>
            <button class="server-btn" onclick="changeServer('zoro')">Zoro</button>
            <button class="server-btn" onclick="changeServer('animepahe')">AnimePahe</button>
        </div>

        <!-- Anime Info -->
        <div class="anime-info" id="animeInfo">
            <h1 class="anime-title" id="animeTitle">Loading...</h1>
            <div class="anime-meta" id="animeMeta"></div>
            <div class="genre-tags" id="genreTags"></div>
            <div class="synopsis" id="synopsis"></div>
        </div>

        <!-- Episodes -->
        <div class="episodes-section">
            <div class="section-title">
                <i class="fas fa-list"></i>
                <h3>Daftar Episode</h3>
            </div>
            <div class="episode-grid" id="episodeGrid">
                <div class="loading"><i class="fas fa-spinner"></i> Memuat episode...</div>
            </div>
        </div>

        <!-- Related Anime -->
        <div class="related-section">
            <div class="section-title">
                <i class="fas fa-film"></i>
                <h3>Anime Rekomendasi</h3>
            </div>
            <div class="related-grid" id="relatedGrid"></div>
        </div>

        <!-- Comments -->
        <div class="comments-section">
            <div class="section-title">
                <i class="fas fa-comments"></i>
                <h3>Komentar</h3>
            </div>
            
            <!-- Comment Input -->
            <div class="comment-input-area">
                <input type="text" class="comment-input" id="commentInput" placeholder="Tulis komentar... (akan dikirim ke Telegram owner)">
                <button class="comment-btn" onclick="sendComment()">
                    <i class="fas fa-paper-plane"></i>
                    <span>Kirim</span>
                </button>
            </div>

            <!-- Comments List -->
            <div class="comments-list" id="commentsList">
                <!-- Comments will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <div class="nav-item" onclick="navigateTo('profile')">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </div>
        <div class="nav-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Log Out</span>
        </div>
    </div>

    <script>
        // Check login status
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display user info
        const username = localStorage.getItem('username') || 'AnimeFan';
        document.getElementById('displayUsername').textContent = username;
        document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();

        // Get anime ID from localStorage
        const animeId = localStorage.getItem('currentAnimeId');
        const animeTitle = localStorage.getItem('currentAnimeTitle') || 'One Piece';

        // API Configuration
        const CONSUMET_API = 'https://api.consumet.org/anime';
        const TELEGRAM_BOT_TOKEN = '7840577565:AAGDOK46mIhCclVfS_w25bB6o9JzvfXqJN4';
        const TELEGRAM_CHAT_ID = '6112244464';

        let currentEpisodeId = null;
        let currentServer = 'gogoanime';
        let episodesData = [];

        // Load anime details and episodes
        async function loadAnimeDetails() {
            try {
                // Try multiple sources
                const sources = ['gogoanime', 'zoro', 'animepahe'];
                let animeFound = false;

                for (const source of sources) {
                    try {
                        const searchRes = await fetch(`${CONSUMET_API}/${source}/${animeTitle}`);
                        const searchData = await searchRes.json();
                        
                        if (searchData.results && searchData.results.length > 0) {
                            const anime = searchData.results[0];
                            
                            // Get detailed info
                            const infoRes = await fetch(`${CONSUMET_API}/${source}/info/${anime.id}`);
                            const infoData = await infoRes.json();
                            
                            displayAnimeInfo(infoData);
                            loadEpisodes(infoData.id, source);
                            animeFound = true;
                            break;
                        }
                    } catch (e) {
                        console.log(`Failed with ${source}:`, e);
                    }
                }

                if (!animeFound) {
                    loadFallbackData();
                }
            } catch (error) {
                console.error('Error loading anime:', error);
                loadFallbackData();
            }
        }

        function displayAnimeInfo(anime) {
            document.getElementById('animeTitle').textContent = anime.title || animeTitle;
            
            // Meta info
            const metaHtml = `
                <span class="meta-item"><i class="fas fa-star"></i> ${anime.score || 'N/A'}</span>
                <span class="meta-item"><i class="fas fa-calendar"></i> ${anime.releaseDate || 'TBA'}</span>
                <span class="meta-item"><i class="fas fa-tv"></i> ${anime.type || 'TV'}</span>
                <span class="meta-item"><i class="fas fa-layer-group"></i> ${anime.totalEpisodes || '?'} Episode</span>
            `;
            document.getElementById('animeMeta').innerHTML = metaHtml;

            // Genres
            if (anime.genres) {
                const genresHtml = anime.genres.map(genre => 
                    `<span class="genre-tag" onclick="searchGenre('${genre}')">${genre}</span>`
                ).join('');
                document.getElementById('genreTags').innerHTML = genresHtml;
            }

            // Synopsis
            document.getElementById('synopsis').textContent = anime.description || 'Sinopsis tidak tersedia.';
        }

        async function loadEpisodes(animeId, source) {
            try {
                const response = await fetch(`${CONSUMET_API}/${source}/info/${animeId}`);
                const data = await response.json();
                
                episodesData = data.episodes || [];
                renderEpisodes(episodesData);
                
                // Load related anime
                loadRelatedAnime(animeTitle);
                
            } catch (error) {
                console.error('Error loading episodes:', error);
                document.getElementById('episodeGrid').innerHTML = '<p style="color: #FFD700; text-align: center;">Gagal memuat episode. Coba sumber lain.</p>';
            }
        }

        function renderEpisodes(episodes) {
            const grid = document.getElementById('episodeGrid');
            
            if (!episodes || episodes.length === 0) {
                grid.innerHTML = '<p style="color: #FFD700; text-align: center;">Episode tidak tersedia.</p>';
                return;
            }

            grid.innerHTML = episodes.map((ep, index) => `
                <div class="episode-btn" onclick="playEpisode('${ep.id}', ${index + 1})">
                    Episode ${ep.number || index + 1}
                </div>
            `).join('');
        }

        async function playEpisode(episodeId, episodeNumber) {
            try {
                // Show loading
                document.getElementById('loading').style.display = 'block';
                document.getElementById('videoPlaceholder').style.display = 'none';
                document.getElementById('videoPlayer').style.display = 'none';
                document.getElementById('serverSelector').style.display = 'flex';

                // Try to get streaming links from multiple sources
                const sources = ['gogoanime', 'zoro', 'animepahe'];
                let videoUrl = null;

                for (const source of sources) {
                    try {
                        const response = await fetch(`${CONSUMET_API}/${source}/watch/${episodeId}`);
                        const data = await response.json();
                        
                        if (data.sources && data.sources.length > 0) {
                            // Get the highest quality
                            const sources_ = data.sources.sort((a, b) => b.quality - a.quality);
                            videoUrl = sources_[0].url;
                            break;
                        }
                    } catch (e) {
                        console.log(`Failed to get stream from ${source}`);
                    }
                }

                if (videoUrl) {
                    const videoPlayer = document.getElementById('videoPlayer');
                    videoPlayer.src = videoUrl;
                    videoPlayer.style.display = 'block';
                    
                    // Highlight active episode
                    document.querySelectorAll('.episode-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    event.target.classList.add('active');

                    showNotification(`Memutar Episode ${episodeNumber}`);
                } else {
                    // Fallback to embed player
                    const embedUrl = `https://www.2embed.cc/embed/${episodeId}`;
                    document.getElementById('videoPlayer').src = embedUrl;
                    document.getElementById('videoPlayer').style.display = 'block';
                }

            } catch (error) {
                console.error('Error playing episode:', error);
                // Fallback to YouTube search
                const searchQuery = `${animeTitle} episode ${episodeNumber} sub indo`;
                document.getElementById('videoPlayer').src = `https://www.youtube.com/embed?listType=search&list=${searchQuery}`;
                document.getElementById('videoPlayer').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function changeServer(server) {
            currentServer = server;
            
            // Update active server button
            document.querySelectorAll('.server-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Reload current episode with new server
            if (currentEpisodeId) {
                playEpisode(currentEpisodeId, currentEpisodeNumber);
            }
        }

        async function loadRelatedAnime(title) {
            try {
                const response = await fetch(`${CONSUMET_API}/gogoanime/${title}`);
                const data = await response.json();
                
                const relatedGrid = document.getElementById('relatedGrid');
                const related = data.results.slice(0, 6);
                
                relatedGrid.innerHTML = related.map(anime => `
                    <div class="related-card" onclick="watchAnime('${anime.id}', '${anime.title}')">
                        <div class="related-image" style="background-image: url('${anime.image || ''}')"></div>
                        <div class="related-title">${anime.title}</div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading related:', error);
            }
        }

        function loadFallbackData() {
            document.getElementById('animeTitle').textContent = animeTitle;
            document.getElementById('synopsis').textContent = 'Sinopsis tidak tersedia untuk saat ini.';
            
            // Generate dummy episodes
            const dummyEpisodes = Array.from({ length: 12 }, (_, i) => ({
                id: `episode-${i+1}`,
                number: i+1
            }));
            renderEpisodes(dummyEpisodes);
        }

        // Search genre
        function searchGenre(genre) {
            localStorage.setItem('searchGenre', genre);
            window.location.href = 'index.html';
        }

        function watchAnime(id, title) {
            localStorage.setItem('currentAnimeId', id);
            localStorage.setItem('currentAnimeTitle', title);
            window.location.reload();
        }

        // Comments functionality
        function loadComments() {
            const comments = JSON.parse(localStorage.getItem('animeComments_' + animeId)) || [];
            const commentsList = document.getElementById('commentsList');
            
            if (comments.length === 0) {
                commentsList.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center;">Belum ada komentar. Jadilah yang pertama!</p>';
                return;
            }

            commentsList.innerHTML = comments.reverse().map(comment => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span><i class="fas fa-user"></i> ${comment.username}</span>
                        <span class="comment-time">${comment.time}</span>
                    </div>
                    <div class="comment-text">${comment.text}</div>
                </div>
            `).join('');
        }

        async function sendComment() {
            const commentInput = document.getElementById('commentInput');
            const comment = commentInput.value.trim();

            if (!comment) {
                alert('Komentar tidak boleh kosong!');
                return;
            }

            const username = localStorage.getItem('username') || 'Anonymous';
            const time = new Date().toLocaleString('id-ID');

            // Save comment locally
            const comments = JSON.parse(localStorage.getItem('animeComments_' + animeId)) || [];
            comments.push({
                username: username,
                text: comment,
                time: time
            });
            localStorage.setItem('animeComments_' + animeId, JSON.stringify(comments));

            // Send to Telegram
            const message = `💬 *Komentar Baru di SendyPlay!*\n\n📺 *Anime:* ${animeTitle}\n👤 *User:* ${username}\n⏰ *Waktu:* ${time}\n💭 *Komentar:* ${comment}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    showNotification('Komentar terkirim ke Telegram owner!');
                } else {
                    showNotification('Komentar disimpan (Telegram notifikasi gagal)', false);
                }
            } catch (error) {
                console.error('Error sending to Telegram:', error);
                showNotification('Komentar disimpan secara lokal', false);
            }

            commentInput.value = '';
            loadComments();
        }

        function showNotification(message, isSuccess = true) {
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notificationMessage');
            
            notificationMessage.textContent = message;
            notification.style.background = isSuccess ? '#FFD700' : '#ff6b6b';
            notification.style.color = isSuccess ? '#1a120b' : 'white';
            notification.style.display = 'flex';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function goBack() {
            window.history.back();
        }

        function navigateTo(page) {
            if (page === 'profile') {
                window.location.href = 'profile.html';
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }

        // Load data on page load
        loadAnimeDetails();
        loadComments();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SendyPlay - Login</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a120b 0%, #2d1f12 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Anime background effect */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path d="M20,20 Q40,10 60,20 Q80,30 70,50 Q60,70 40,70 Q20,70 30,45 Q25,30 20,20" fill="%23FFD966"/><circle cx="70" cy="30" r="5" fill="%23FFD966"/><circle cx="30" cy="60" r="8" fill="%23FFD966"/></svg>');
            background-repeat: repeat;
            animation: float 60s linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-20%, -20%) rotate(5deg); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(255, 215, 0, 0.3);
            width: 90%;
            max-width: 450px;
            padding: 45px 35px;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 2px solid #FFD700;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .logo i {
            font-size: 50px;
            color: #FFD700;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 10px rgba(255, 215, 0, 0.5));
        }

        .tab-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 60px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: #FFD700;
            color: #1a120b;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .form-container {
            transition: 0.3s;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #FFD700;
            font-size: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 15px;
            transition: 0.3s;
            background: white;
        }

        .input-wrapper input:focus {
            border-color: #FFD700;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a120b;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin: 20px 0;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.5);
        }

        .footer-text {
            color: #666;
            font-size: 14px;
        }

        .footer-text a {
            color: #FFD700;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-note {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }

        /* Alert */
        .alert {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 15px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .alert i {
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-film"></i>
            <h1>SendyPlay</h1>
        </div>

        <!-- Tab Login/Register -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')" id="loginTab">Login</button>
            <button class="tab-btn" onclick="switchTab('register')" id="registerTab">Daftar</button>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="alert">
            <i class="fas fa-info-circle"></i>
            <span id="alertMessage"></span>
        </div>

        <!-- Form Login -->
        <div id="loginForm" class="form-container">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="Masukkan username" value="animefan" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Masukkan password" value="anime123" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>
        </div>

        <!-- Form Register -->
        <div id="registerForm" class="form-container" style="display: none;">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regUsername" placeholder="Pilih username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Email aktif" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-user-plus"></i> Daftar
                </button>
            </form>
        </div>

        <div class="footer-note">
            © 2025 SendyPlay - Nonton Anime Gratis
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }

        function showAlert(message, isSuccess = true) {
            const alertBox = document.getElementById('alertBox');
            const alertMessage = document.getElementById('alertMessage');
            alertMessage.innerText = message;
            alertBox.style.display = 'flex';
            alertBox.style.background = isSuccess ? '#d4edda' : '#fff3cd';
            alertBox.style.color = isSuccess ? '#155724' : '#856404';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            // Simulasi login (di real app akan ke backend)
            if (username && password) {
                // Simpan status login
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                localStorage.setItem('userEmail', username + '@example.com');
                
                showAlert('Login berhasil! Mengalihkan...', true);
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showAlert('Username dan password harus diisi!', false);
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (username && email && password.length >= 6) {
                // Simulasi register sukses
                showAlert('Registrasi berhasil! Silakan login.', true);
                
                // Switch ke tab login
                setTimeout(() => {
                    switchTab('login');
                }, 1500);
            } else {
                showAlert('Password minimal 6 karakter!', false);
            }
        }
    </script>
</body>
</html>

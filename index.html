<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SendyPlay - Dashboard Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #1a120b;
            color: white;
            padding-bottom: 80px;
        }

        /* Navbar */
        .navbar {
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #FFD700;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-bar {
            flex: 1;
            max-width: 500px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 8px 20px;
            border: 1px solid #FFD700;
        }

        .search-bar i {
            color: #FFD700;
            margin-right: 10px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            padding: 8px 0;
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-bar input:focus {
            outline: none;
        }

        .search-btn {
            background: #FFD700;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            margin-left: 10px;
            color: #1a120b;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover {
            background: #FFA500;
            transform: scale(1.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #FFD700;
            font-weight: 600;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a120b;
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(145deg, #2d1f12, #1a120b);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid #FFD700;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            max-width: 600px;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .category-btn:hover, .category-btn.active {
            background: #FFD700;
            color: #1a120b;
            border-color: #FFD700;
        }

        /* Search Results */
        .search-results {
            margin-top: 30px;
            display: none;
        }

        .search-results.show {
            display: block;
        }

        /* Anime Grid */
        .section-title {
            font-size: 24px;
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #FFD700;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .anime-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .anime-card:hover {
            transform: translateY(-10px);
            border-color: #FFD700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .anime-image {
            width: 100%;
            height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .anime-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .anime-info {
            padding: 15px;
            position: relative;
        }

        .anime-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
            color: #FFD700;
        }

        .anime-meta {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .rating {
            color: #FFD700;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: #FFD700;
        }

        .loading i {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 18, 11, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 2px solid #FFD700;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item:hover, .nav-item.active {
            color: #FFD700;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                align-items: stretch;
            }
            .search-bar {
                max-width: 100%;
            }
            .hero-title {
                font-size: 32px;
            }
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .user-info {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><i class="fas fa-film"></i> SendyPlay</h2>
            </div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Cari anime..." id="searchInput" onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="searchAnime()">Cari</button>
            </div>
            <div class="user-info">
                <span class="username" id="displayUsername"></span>
                <div class="avatar" id="userAvatar"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Hero Section -->
        <div class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">Selamat Datang di SendyPlay! 🎬</h1>
                <p class="hero-subtitle">Nonton ribuan anime gratis, subtitle Indonesia. Update setiap hari!</p>
            </div>
        </div>

        <!-- Categories -->
        <div class="categories" id="categories">
            <button class="category-btn active" onclick="filterByCategory('all')">Semua</button>
            <button class="category-btn" onclick="filterByCategory('action')">Action</button>
            <button class="category-btn" onclick="filterByCategory('romance')">Romance</button>
            <button class="category-btn" onclick="filterByCategory('comedy')">Comedy</button>
            <button class="category-btn" onclick="filterByCategory('fantasy')">Fantasy</button>
            <button class="category-btn" onclick="filterByCategory('slice-of-life')">Slice of Life</button>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <i class="fas fa-spinner"></i>
            <p>Memuat anime...</p>
        </div>

        <!-- Search Results Section -->
        <div id="searchResults" class="search-results">
            <div class="section-title">
                <i class="fas fa-search"></i>
                <h3>Hasil Pencarian: <span id="searchQuery"></span></h3>
            </div>
            <div class="anime-grid" id="searchGrid"></div>
        </div>

        <!-- Regular Sections -->
        <div id="regularSections">
            <div class="section-title">
                <i class="fas fa-fire"></i>
                <h3>Trending Minggu Ini</h3>
            </div>
            <div class="anime-grid" id="trendingGrid"></div>

            <div class="section-title">
                <i class="fas fa-clock"></i>
                <h3>Rilis Terbaru</h3>
            </div>
            <div class="anime-grid" id="latestGrid"></div>

            <div class="section-title">
                <i class="fas fa-star"></i>
                <h3>Rekomendasi Untukmu</h3>
            </div>
            <div class="anime-grid" id="recommendedGrid"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <div class="nav-item" onclick="navigateTo('profile')">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </div>
        <div class="nav-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Log Out</span>
        </div>
    </div>

    <script>
        // Check login status
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display user info
        const username = localStorage.getItem('username') || 'AnimeFan';
        document.getElementById('displayUsername').textContent = username;
        document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();

        // API Configuration
        const CONSUMET_API = 'https://api.consumet.org/anime';
        const JIKAN_API = 'https://api.jikan.moe/v4';

        // Check for genre from watch page
        const searchGenre = localStorage.getItem('searchGenre');
        if (searchGenre) {
            localStorage.removeItem('searchGenre');
            filterByCategory(searchGenre.toLowerCase());
        }

        // Fetch anime from API
        async function fetchAnime() {
            try {
                document.getElementById('loading').style.display = 'block';

                // Fetch trending (popular)
                const trendingRes = await fetch(`${CONSUMET_API}/gogoanime/popular`);
                const trendingData = await trendingRes.json();

                // Fetch latest
                const latestRes = await fetch(`${CONSUMET_API}/gogoanime/recent-episodes`);
                const latestData = await latestRes.json();

                // Fetch recommendations (top airing)
                const recommendedRes = await fetch(`${CONSUMET_API}/gogoanime/top-airing`);
                const recommendedData = await recommendedRes.json();

                renderAnimeGrid('trendingGrid', trendingData.results.slice(0, 10));
                renderAnimeGrid('latestGrid', latestData.results.slice(0, 10));
                renderAnimeGrid('recommendedGrid', recommendedData.results.slice(0, 10));

                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Error fetching anime:', error);
                document.getElementById('loading').innerHTML = '<p>Gagal memuat anime. Menggunakan data cadangan...</p>';
                loadFallbackData();
            }
        }

        function renderAnimeGrid(elementId, animeList) {
            const grid = document.getElementById(elementId);
            if (!grid) return;
            
            grid.innerHTML = '';

            animeList.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = () => watchAnime(anime.id, anime.title);
                
                const imageUrl = anime.image || anime.images?.jpg?.image_url || '';
                const rating = anime.rating || anime.score || 'N/A';
                const episodeCount = anime.episodeNumber || anime.episodes || '?';
                
                card.innerHTML = `
                    <div class="anime-image" style="background-image: url('${imageUrl}');">
                        <!-- Overlay gradient from CSS -->
                    </div>
                    <div class="anime-info">
                        <div class="anime-title">${anime.title}</div>
                        <div class="anime-meta">
                            <span><i class="fas fa-star rating"></i> ${typeof rating === 'number' ? rating.toFixed(1) : rating}</span>
                            <span><i class="fas fa-play-circle"></i> ${episodeCount} eps</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Search functionality
        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                alert('Masukkan judul anime yang ingin dicari!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('searchQuery').textContent = query;
            
            try {
                // Try multiple sources
                const sources = ['gogoanime', 'zoro', 'animepahe'];
                let allResults = [];

                for (const source of sources) {
                    try {
                        const response = await fetch(`${CONSUMET_API}/${source}/${encodeURIComponent(query)}`);
                        const data = await response.json();
                        
                        if (data.results && data.results.length > 0) {
                            allResults = [...allResults, ...data.results];
                        }
                    } catch (e) {
                        console.log(`Search failed on ${source}`);
                    }
                }

                // Remove duplicates based on title
                const uniqueResults = Array.from(new Map(allResults.map(item => [item.title, item])).values());

                if (uniqueResults.length > 0) {
                    renderAnimeGrid('searchGrid', uniqueResults.slice(0, 20));
                    document.getElementById('searchResults').classList.add('show');
                    document.getElementById('regularSections').style.display = 'none';
                } else {
                    document.getElementById('searchGrid').innerHTML = '<div class="no-results"><i class="fas fa-sad-tear"></i><p>Anime tidak ditemukan. Coba judul lain!</p></div>';
                    document.getElementById('searchResults').classList.add('show');
                    document.getElementById('regularSections').style.display = 'none';
                }

            } catch (error) {
                console.error('Search error:', error);
                document.getElementById('searchGrid').innerHTML = '<div class="no-results"><i class="fas fa-exclamation-triangle"></i><p>Terjadi kesalahan. Silakan coba lagi.</p></div>';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchAnime();
            }
        }

        // Filter by category
        async function filterByCategory(category) {
            // Update active category
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (category === 'all') {
                // Show regular sections
                document.getElementById('searchResults').classList.remove('show');
                document.getElementById('regularSections').style.display = 'block';
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('searchQuery').textContent = category;
            
            try {
                // Search by genre using Jikan API
                const response = await fetch(`${JIKAN_API}/anime?genres=${getGenreId(category)}&limit=20`);
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    renderAnimeGrid('searchGrid', data.data.map(anime => ({
                        id: anime.mal_id,
                        title: anime.title,
                        image: anime.images.jpg.image_url,
                        rating: anime.score,
                        episodeNumber: anime.episodes
                    })));
                    document.getElementById('searchResults').classList.add('show');
                    document.getElementById('regularSections').style.display = 'none';
                }
            } catch (error) {
                console.error('Category filter error:', error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function getGenreId(genre) {
            const genres = {
                'action': 1,
                'romance': 22,
                'comedy': 4,
                'fantasy': 10,
                'slice-of-life': 36
            };
            return genres[genre] || 1;
        }

        function loadFallbackData() {
            const fallbackAnime = [
                { id: 'one-piece', title: 'One Piece', image: '', rating: 8.9, episodeNumber: 1000 },
                { id: 'naruto', title: 'Naruto', image: '', rating: 8.5, episodeNumber: 500 },
                { id: 'attack-on-titan', title: 'Attack on Titan', image: '', rating: 9.0, episodeNumber: 75 },
                { id: 'demon-slayer', title: 'Demon Slayer', image: '', rating: 8.8, episodeNumber: 55 },
                { id: 'jujutsu-kaisen', title: 'Jujutsu Kaisen', image: '', rating: 8.7, episodeNumber: 24 },
                { id: 'my-hero-academia', title: 'My Hero Academia', image: '', rating: 8.4, episodeNumber: 113 }
            ];
            
            renderAnimeGrid('trendingGrid', fallbackAnime);
            renderAnimeGrid('latestGrid', fallbackAnime);
            renderAnimeGrid('recommendedGrid', fallbackAnime);
        }

        function watchAnime(animeId, title) {
            localStorage.setItem('currentAnimeId', animeId);
            localStorage.setItem('currentAnimeTitle', title);
            window.location.href = 'watch.html';
        }

        function navigateTo(page) {
            if (page === 'profile') {
                window.location.href = 'profile.html';
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        // Load anime on page load
        fetchAnime();
    </script>
</body>
</html>
